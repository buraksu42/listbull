name: CI

# Phase 4 strict CI gate. Steps:
#   1. lint
#   2. typecheck
#   3. vitest unit suite
#   4. SKIP_ENV_VALIDATION build (catches type errors that lint / tsc miss)
#
# E2E (Playwright) lives in `e2e.yml` — a separate workflow because
# it spins up Postgres and is gated behind LISTGRAM_E2E_LIVE.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-typecheck-test-build:
    name: Lint + Type check + Vitest + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests (Vitest)
        run: npm test

      - name: Production build (env validation skipped)
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "1"
